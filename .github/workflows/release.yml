name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf usb-mess-${{ matrix.target }}.tar.gz usb-mess
          sha256sum usb-mess-${{ matrix.target }}.tar.gz > usb-mess-${{ matrix.target }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/usb-mess-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/usb-mess-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate release notes
        id: notes
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          {
            echo "## usb-mess ${GITHUB_REF_NAME}"
            echo
            echo "Static Linux binaries for x86_64 and aarch64 (musl)."
            echo
            echo "### Install"
            echo '```sh'
            echo "curl -L https://github.com/tazhate/usb-mess/releases/download/${GITHUB_REF_NAME}/usb-mess-x86_64-unknown-linux-musl.tar.gz | tar xz"
            echo "sudo install -m 755 usb-mess /usr/local/bin/"
            echo '```'
            echo
            echo "### Changes"
            git log --pretty=format:'- %s' $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD || git log --pretty=format:'- %s'
          } > NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: NOTES.md
          files: dist/**/*
          draft: false
          prerelease: false
